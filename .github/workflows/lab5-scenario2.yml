name: "Lab5 — Scenario 2 (headless)"

on:
  workflow_dispatch:
  push:
    paths:
      - "lab5/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lab5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run Scenario 2
        run: pytest test_scenario2.py -v --tb=short

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scenario2-artifacts
          path: lab5/artifacts/
          retention-days: 30
